<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#0a3018"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="num" x1="16" y1="12" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- Subtle leaf flourish top-right -->
  <circle cx="50" cy="14" r="7" fill="#16a34a" opacity="0.35"/>
  <circle cx="56" cy="10" r="4" fill="#16a34a" opacity="0.2"/>

  <!-- Bold numeral 5 -->
  <text
    x="33"
    y="47"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="900"
    font-size="40"
    letter-spacing="-2"
    fill="url(#num)"
  >5</text>

  <!-- Small dot accent -->
  <circle cx="48" cy="47" r="4" fill="#fde047" opacity="0.7"/>
</svg>
